{{- $services := list
  (dict
    "Label" "api"
    "Port" 1883
  )
  (dict
    "Component" "controller"
    "Port" 1883
  )
}}

{{- if .Values.global.config }}
{{- $services = append $services (dict
  "Label" "config-server"
  "Port" 1883
)}}
{{- end }}

{{- if .Values.global.energyMonitor }}
{{- $services = append $services (dict
  "Label" "energy-monitor"
  "Port" 1883
)}}
{{- end }}

{{- if .Values.global.event }}
{{- $services = append $services (dict
  "Label" "event"
  "Port" 1883
)}}
{{- end }}

{{- if .Values.global.persistence }}
{{- $services = append $services (dict
  "Label" "persistence"
  "Port" 1883
)}}
{{- end }}

{{- if .Values.global.scheduler }}
{{- $services = append $services (dict
  "Label" "scheduler"
  "Port" 1883
)}}
{{- end }}

{{- if .Values.global.voiceAssistant }}
{{- $services = append $services (dict
  "Label" "voice-assistant"
  "Port" 1883
)}}
{{- end }}

{{- $ssl := eq (include "powerpi.mosquitto-ssl" .) "true" -}}

{{- $local := ternary (dict
      "Direction" "ingress"
      "Cidr" .Values.localCIDR
      "Port" (ternary 8883 1883 $ssl)
    ) nil (eq (include "powerpi.external-mqtt" .) "true") 
-}}

{{/* The network controller uses hostNetwork for Wake-on-LAN. Traffic from hostNetwork pods
     to cluster services gets MASQUERADE'd to a Calico pod CIDR IP, so podSelector-based ingress
     rules can't match it. Allow ingress on 8883 from the pod CIDR, looked up from the Calico
     IPPool at deploy time. MQTT authentication and TLS provide the access control. */}}
{{- if .Values.global.network -}}
{{- $podCidr := (lookup "crd.projectcalico.org/v1" "IPPool" "" "default-ipv4-ippool").spec.cidr -}}
{{- if $podCidr -}}
{{- $services = append $services (dict
  "Cidr" $podCidr
  "Port" 8883
) -}}
{{- end -}}
{{- end -}}

{{- $data := dict
    "Name" "mosquitto-policy"
    "Label" "mosquitto"
    "Ingress" $services
    "Local" $local
}}
{{ include "powerpi.network-policy" (merge (dict "Params" $data) .) }}
