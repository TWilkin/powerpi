{{- if eq .Values.global.useSensors true -}}
apiVersion: v1
kind: Secret
metadata:
  name: mosquitto-device-secret
  {{- include "powerpi.labels" . }}
type: Opaque
data:
  username: {{ "device" | b64enc | quote }}
  password: {{ $deviceSecret | quote }}
