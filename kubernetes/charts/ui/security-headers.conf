# Prevent the site from being embedded in iframes (clickjacking protection)
add_header X-Frame-Options "DENY" always;

# Prevent browsers from MIME-sniffing the content type
add_header X-Content-Type-Options "nosniff" always;

# Limit referrer information sent to external sites
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict resource loading:
set $csp "default-src 'self';";
set $csp "${csp} script-src 'self';";          # same-origin only
set $csp "${csp} style-src 'self' 'unsafe-inline';"; # inline styles required by React dynamic styling
set $csp "${csp} img-src 'self' https://cdn.jsdelivr.net;"; # cdn.jsdelivr.net for favicon
set $csp "${csp} connect-src 'self' ws: wss:;"; # WebSocket for Socket.IO
set $csp "${csp} frame-ancestors 'none';";     # prevent iframe embedding (CSP equivalent of X-Frame-Options)
set $csp "${csp} base-uri 'self';";            # same-origin only
set $csp "${csp} form-action 'self' https://accounts.google.com"; # Google OAuth redirect during authentication
add_header Content-Security-Policy $csp always;
