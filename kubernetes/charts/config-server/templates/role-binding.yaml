piVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: config-server
  {{- include "powerpi.labels" . }}

subjects:
  - kind: ServiceAccount
    name: config-server
    namespace: {{ .Release.Namespace }}

roleRef:
  kind: Role
  name: config-server
  apiGroup: rbac.authorization.k8s.io
